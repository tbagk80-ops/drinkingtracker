<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1A1A1E" />
<title>오늘 마신 잔</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="오늘 마신 잔" />

<style>
  html, body, #root { margin:0; padding:0; height:100%; background:#1A1A1E; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

const DRINKS = [
  { id: "somaek", label: "소맥", unit: "잔(500cc)", abv: 8, ml: 500, color: "#7AC74F" },
  { id: "soju", label: "소주", unit: "잔", abv: 16, ml: 50, color: "#4FB6E8" },
  { id: "beer", label: "맥주", unit: "잔(500cc)", abv: 4.5, ml: 500, color: "#F2B705" },
  { id: "sake", label: "사케", unit: "잔", abv: 15, ml: 90, color: "#D6CDEA" },
  { id: "wine", label: "와인", unit: "잔", abv: 13, ml: 120, color: "#9A2B4C" },
  { id: "highball", label: "하이볼", unit: "잔", abv: 7, ml: 250, color: "#E8743B" },
  { id: "makgeolli", label: "막걸리", unit: "잔", abv: 6, ml: 150, color: "#F4F1EA" },
];

const standardDrinks = (drink, count) => {
  const pureAlcoholMl = drink.ml * (drink.abv / 100) * count;
  const grams = pureAlcoholMl * 0.789;
  return grams / 8;
};

const HISTORY_KEY = "drink-tracker-history-v1";

const todayKey = () => {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}

function saveHistory(history) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch {}
}

function DrinkTracker() {
  const [history, setHistory] = useState(() => loadHistory());
  const [tab, setTab] = useState("today");
  const key = todayKey();
  const counts = history[key] || {};

  const update = (next) => {
    const nextHistory = { ...history };
    const hasAny = Object.values(next).some((v) => v > 0);
    if (hasAny) {
      nextHistory[key] = next;
    } else {
      delete nextHistory[key];
    }
    setHistory(nextHistory);
    saveHistory(nextHistory);
  };

  const add = (drink) => {
    update({ ...counts, [drink.id]: (counts[drink.id] || 0) + 1 });
  };

  const remove = (drink) => {
    if (!counts[drink.id]) return;
    update({ ...counts, [drink.id]: counts[drink.id] - 1 });
  };

  const reset = () => {
    update({});
  };

  const totalStd = DRINKS.reduce(
    (sum, d) => sum + standardDrinks(d, counts[d.id] || 0),
    0
  );

  const level =
    totalStd === 0
      ? { label: "시작 전", color: "#6B7280", desc: "오늘의 첫 잔을 기록해보세요" }
      : totalStd <= 2
      ? { label: "가볍게", color: "#4FB6E8", desc: "적당한 페이스예요" }
      : totalStd <= 4
      ? { label: "적당히", color: "#F2B705", desc: "이쯔 물 한 잔 어때요" }
      : totalStd <= 6
      ? { label: "많이", color: "#E8743B", desc: "속도를 줄이는 걸 권장해요" }
      : { label: "과음", color: "#C0392B", desc: "오늘은 여기까지가 좋겠어요" };

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#1A1A1E",
        color: "#F4F1EA",
        padding: "24px 16px 80px",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
      }}
    >
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div
            style={{
              fontSize: 13,
              letterSpacing: "0.2em",
              color: "#8A8A92",
              marginBottom: 6,
              textTransform: "uppercase",
            }}
          >
            Tonight's Tab
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: "-0.02em" }}>
            오늘 마신 잔
          </div>
        </div>

        <div
          style={{
            display: "flex",
            gap: 8,
            marginBottom: 20,
            background: "#26262C",
            borderRadius: 999,
            padding: 4,
          }}
        >
          {[
            { id: "today", label: "오늘" },
            { id: "stats", label: "기록" },
          ].map((t) => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              style={{
                flex: 1,
                padding: "10px 0",
                borderRadius: 999,
                border: "none",
                background: tab === t.id ? "#3A3A42" : "transparent",
                color: tab === t.id ? "#F4F1EA" : "#8A8A92",
                fontWeight: 700,
                fontSize: 14,
                cursor: "pointer",
              }}
            >
              {t.label}
            </button>
          ))}
        </div>

        {tab === "today" && (
        <>

        <div
          style={{
            background: "#26262C",
            borderRadius: 20,
            padding: "28px 24px",
            marginBottom: 24,
            border: `1px solid ${level.color}33`,
            position: "relative",
            overflow: "hidden",
          }}
        >
          <div
            style={{
              position: "absolute",
              top: -40,
              right: -40,
              width: 140,
              height: 140,
              borderRadius: "50%",
              background: level.color,
              opacity: 0.12,
              filter: "blur(20px)",
            }}
          />
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontSize: 48, fontWeight: 800, lineHeight: 1 }}>
              {totalStd.toFixed(1)}
            </span>
            <span style={{ fontSize: 16, color: "#8A8A92" }}>표준잔</span>
          </div>
          <div
            style={{
              marginTop: 14,
              display: "inline-flex",
              alignItems: "center",
              gap: 8,
              padding: "6px 14px",
              borderRadius: 999,
              background: `${level.color}22`,
              border: `1px solid ${level.color}55`,
            }}
          >
            <span
              style={{
                width: 8,
                height: 8,
                borderRadius: "50%",
                background: level.color,
                display: "inline-block",
              }}
            />
            <span style={{ fontSize: 14, fontWeight: 700, color: level.color }}>
              {level.label}
            </span>
          </div>
          <div style={{ marginTop: 10, fontSize: 13, color: "#B5B5BD" }}>
            {level.desc}
          </div>

          <div
            style={{
              marginTop: 18,
              height: 6,
              borderRadius: 999,
              background: "#3A3A42",
              overflow: "hidden",
            }}
          >
            <div
              style={{
                height: "100%",
                width: `${Math.min((totalStd / 8) * 100, 100)}%`,
                background: level.color,
                transition: "width 0.4s ease",
              }}
            />
          </div>
          <div
            style={{
              display: "flex",
              justifyContent: "space-between",
              fontSize: 11,
              color: "#6B6B73",
              marginTop: 6,
            }}
          >
            <span>0</span>
            <span>4</span>
            <span>8 표준잔</span>
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {DRINKS.map((d) => {
            const count = counts[d.id] || 0;
            return (
              <div
                key={d.id}
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  background: "#26262C",
                  borderRadius: 14,
                  padding: "14px 16px",
                  border: count > 0 ? `1px solid ${d.color}55` : "1px solid #33333B",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div
                    style={{
                      width: 10,
                      height: 10,
                      borderRadius: "50%",
                      background: d.color,
                    }}
                  />
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{d.label}</div>
                    <div style={{ fontSize: 12, color: "#8A8A92" }}>
                      1{d.unit} · 도수 {d.abv}%
                    </div>
                  </div>
                </div>

                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button
                    onClick={() => remove(d)}
                    disabled={count === 0}
                    style={{
                      width: 36,
                      height: 36,
                      borderRadius: "50%",
                      border: "1px solid #44444C",
                      background: "transparent",
                      color: count === 0 ? "#444" : "#F4F1EA",
                      fontSize: 18,
                      cursor: count === 0 ? "default" : "pointer",
                      lineHeight: 1,
                    }}
                  >
                    −
                  </button>
                  <span
                    style={{
                      minWidth: 24,
                      textAlign: "center",
                      fontSize: 18,
                      fontWeight: 800,
                    }}
                  >
                    {count}
                  </span>
                  <button
                    onClick={() => add(d)}
                    style={{
                      width: 36,
                      height: 36,
                      borderRadius: "50%",
                      border: "none",
                      background: d.color,
                      color: "#1A1A1E",
                      fontSize: 18,
                      fontWeight: 800,
                      cursor: "pointer",
                      lineHeight: 1,
                    }}
                  >
                    +
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ marginTop: 24, display: "flex", justifyContent: "center" }}>
          <button
            onClick={reset}
            style={{
              background: "transparent",
              border: "1px solid #44444C",
              color: "#8A8A92",
              fontSize: 13,
              padding: "10px 20px",
              borderRadius: 999,
              cursor: "pointer",
            }}
          >
            오늘 기록 초기화
          </button>
        </div>
        </>
        )}

        {tab === "stats" && <StatsView history={history} />}

        <div
          style={{
            marginTop: 20,
            fontSize: 11,
            color: "#5A5A62",
            textAlign: "center",
            lineHeight: 1.6,
          }}
        >
          표준잔(약 8g 순알코올) 기준 추정치이며, 실제 잔 크기·도수에 따라 달라질 수 있어요.
          <br />기록은 이 기기에만 저장돼요.
        </div>
      </div>
    </div>
  );
}

function StatsView({ history }) {
  const now = new Date();
  const year = now.getFullYear();

  const entries = Object.entries(history)
    .map(([date, counts]) => {
      const total = DRINKS.reduce(
        (sum, d) => sum + standardDrinks(d, counts[d.id] || 0),
        0
      );
      return { date, total };
    })
    .filter((e) => e.total > 0);

  const yearEntries = entries.filter((e) => e.date.startsWith(`${year}-`));
  const yearTotal = yearEntries.reduce((s, e) => s + e.total, 0);
  const yearDays = yearEntries.length;
  const avgPerDay = yearDays ? yearTotal / yearDays : 0;

  const monthly = Array.from({ length: 12 }, (_, i) => {
    const m = String(i + 1).padStart(2, "0");
    const total = yearEntries
      .filter((e) => e.date.slice(5, 7) === m)
      .reduce((s, e) => s + e.total, 0);
    return { month: i + 1, total };
  });
  const maxMonthly = Math.max(1, ...monthly.map((m) => m.total));

  const recent = entries
    .slice()
    .sort((a, b) => (a.date < b.date ? 1 : -1))
    .slice(0, 7);

  return (
    <div>
      <div
        style={{
          background: "#26262C",
          borderRadius: 20,
          padding: "24px 22px",
          marginBottom: 20,
          border: "1px solid #33333B",
        }}
      >
        <div style={{ fontSize: 13, color: "#8A8A92", marginBottom: 4 }}>
          {year}년 누적
        </div>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontSize: 40, fontWeight: 800 }}>
            {yearTotal.toFixed(1)}
          </span>
          <span style={{ fontSize: 14, color: "#8A8A92" }}>표준잔</span>
        </div>
        <div
          style={{
            marginTop: 14,
            display: "flex",
            gap: 20,
            fontSize: 13,
            color: "#B5B5BD",
          }}
        >
          <div>
            <div style={{ fontWeight: 800, fontSize: 18, color: "#F4F1EA" }}>
              {yearDays}
            </div>
            음주 일수
          </div>
          <div>
            <div style={{ fontWeight: 800, fontSize: 18, color: "#F4F1EA" }}>
              {avgPerDay.toFixed(1)}
            </div>
            마신 날 평균
          </div>
        </div>
      </div>

      <div
        style={{
          background: "#26262C",
          borderRadius: 20,
          padding: "20px 22px",
          marginBottom: 20,
          border: "1px solid #33333B",
        }}
      >
        <div style={{ fontSize: 13, color: "#8A8A92", marginBottom: 14 }}>
          월별 음주량
        </div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100 }}>
          {monthly.map((m) => (
            <div key={m.month} style={{ flex: 1, textAlign: "center" }}>
              <div
                style={{
                  height: 80,
                  display: "flex",
                  alignItems: "flex-end",
                  justifyContent: "center",
                }}
              >
                <div
                  style={{
                    width: "70%",
                    height: `${(m.total / maxMonthly) * 100}%`,
                    minHeight: m.total > 0 ? 3 : 0,
                    background: m.total > 0 ? "#7AC74F" : "#3A3A42",
                    borderRadius: 3,
                  }}
                />
              </div>
              <div style={{ fontSize: 10, color: "#6B6B73", marginTop: 6 }}>
                {m.month}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div
        style={{
          background: "#26262C",
          borderRadius: 20,
          padding: "20px 22px",
          border: "1px solid #33333B",
        }}
      >
        <div style={{ fontSize: 13, color: "#8A8A92", marginBottom: 14 }}>
          최근 기록
        </div>
        {recent.length === 0 && (
          <div style={{ fontSize: 13, color: "#6B6B73" }}>아직 기록이 없어요</div>
        )}
        {recent.map((e) => (
          <div
            key={e.date}
            style={{
              display: "flex",
              justifyContent: "space-between",
              padding: "8px 0",
              borderBottom: "1px solid #33333B",
              fontSize: 13,
            }}
          >
            <span style={{ color: "#B5B5BD" }}>{e.date}</span>
            <span style={{ fontWeight: 700 }}>{e.total.toFixed(1)} 표준잔</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DrinkTracker />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
