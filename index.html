<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFF6E5" />
<title>지켜라 필름</title>

<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="지켜라 필름" />

<style>
  html, body, #root { margin:0; padding:0; height:100%; background:#FFF6E5; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

const DRINKS = [
  { id: "somaek", label: "🍺🥃 소맥", unit: "잔(500cc)", abv: 8, ml: 500, color: "#7AC74F" },
  { id: "soju", label: "🍶 소주", unit: "잔", abv: 12, ml: 50, color: "#4FB6E8" },
  { id: "beer", label: "🍺 맥주", unit: "잔(500cc)", abv: 4.5, ml: 500, color: "#F2B705" },
  { id: "sake", label: "🍶 사케", unit: "잔", abv: 15, ml: 90, color: "#D6CDEA" },
  { id: "wine", label: "🍷 와인", unit: "잔", abv: 13, ml: 120, color: "#9A2B4C" },
  { id: "highball", label: "🥃 하이볼", unit: "잔", abv: 7, ml: 250, color: "#E8743B" },
  { id: "makgeolli", label: "🍶 막걸리", unit: "잔", abv: 6, ml: 150, color: "#3A2E22" },
];

const standardDrinks = (drink, count) => {
  const pureAlcoholMl = drink.ml * (drink.abv / 100) * count;
  const grams = pureAlcoholMl * 0.789;
  return grams / 8;
};

const HISTORY_KEY = "drink-tracker-history-v1";
const SETTINGS_KEY = "drink-tracker-settings-v1";

const pad = (n) => String(n).padStart(2, "0");
const toKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayKey = () => toKey(new Date());

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}
function saveHistory(history) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? JSON.parse(raw) : { email: "", goals: {}, prices: {} };
  } catch {
    return { email: "", goals: {}, prices: {} };
  }
}
function saveSettings(settings) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {}
}

const DEFAULT_PRICES = { somaek: 8000, soju: 5000, beer: 5000, sake: 8000, wine: 10000, highball: 8000, makgeolli: 6000 };

function totalCost(counts, prices) {
  return DRINKS.reduce((sum, d) => sum + (counts[d.id] || 0) * (prices[d.id] ?? DEFAULT_PRICES[d.id]), 0);
}
function formatWon(n) {
  return Math.round(n).toLocaleString("ko-KR") + "원";
}
function totalFor(counts) {
  return DRINKS.reduce((sum, d) => sum + standardDrinks(d, counts[d.id] || 0), 0);
}

function levelFor(totalStd) {
  return totalStd === 0
    ? { label: "🌱 시작 전", color: "#6B7280", desc: "오늘의 필름, 안전합니다" }
    : totalStd <= 2
    ? { label: "😌 가볍게", color: "#4FB6E8", desc: "아직 필름 멀쩡함" }
    : totalStd <= 4
    ? { label: "🙂 적당히", color: "#F2B705", desc: "이쯤 물 한 잔 어때요" }
    : totalStd <= 6
    ? { label: "😵 많이", color: "#E8743B", desc: "필름 흔들리기 시작..." }
    : { label: "🔥 과음", color: "#C0392B", desc: "내일의 나에게 사과하세요" };
}

const card = {
  background: "#FFFFFF",
  borderRadius: 20,
  padding: "20px 22px",
  marginBottom: 20,
  border: "1px solid #F2E6D2",
};

function DrinkTracker() {
  const [history, setHistory] = useState(() => loadHistory());
  const [settings, setSettings] = useState(() => loadSettings());
  const [tab, setTab] = useState("today");
  const [selectedDate, setSelectedDate] = useState(() => todayKey());
  const [emailInput, setEmailInput] = useState(() => loadSettings().email || "");
  const [goalInputs, setGoalInputs] = useState(() => {
    const g = loadSettings().goals || {};
    const init = {};
    DRINKS.forEach((d) => { init[d.id] = g[d.id] ? String(g[d.id]) : ""; });
    return init;
  });
  const [priceInputs, setPriceInputs] = useState(() => {
    const p = loadSettings().prices || {};
    const init = {};
    DRINKS.forEach((d) => { init[d.id] = String(p[d.id] ?? DEFAULT_PRICES[d.id]); });
    return init;
  });

  const counts = history[selectedDate] || {};

  const update = (next) => {
    const nextHistory = { ...history };
    const hasAny = Object.values(next).some((v) => v > 0);
    if (hasAny) nextHistory[selectedDate] = next;
    else delete nextHistory[selectedDate];
    setHistory(nextHistory);
    saveHistory(nextHistory);
  };

  const add = (drink) => update({ ...counts, [drink.id]: (counts[drink.id] || 0) + 1 });
  const remove = (drink) => {
    if (!counts[drink.id]) return;
    update({ ...counts, [drink.id]: counts[drink.id] - 1 });
  };
  const reset = () => update({});

  const totalStd = totalFor(counts);
  const level = levelFor(totalStd);
  const isToday = selectedDate === todayKey();

  const saveLogin = () => {
    const next = { ...settings, email: emailInput.trim() };
    setSettings(next);
    saveSettings(next);
  };
  const logout = () => {
    setEmailInput("");
    const next = { ...settings, email: "" };
    setSettings(next);
    saveSettings(next);
  };
  const savePrices = () => {
    const prices = {};
    DRINKS.forEach((d) => { prices[d.id] = parseInt(priceInputs[d.id], 10) || 0; });
    const next = { ...settings, prices };
    setSettings(next);
    saveSettings(next);
  };
  const saveGoals = () => {
    const goals = {};
    DRINKS.forEach((d) => {
      const val = parseFloat(goalInputs[d.id]) || 0;
      if (val > 0) goals[d.id] = val;
    });
    const next = { ...settings, goals };
    setSettings(next);
    saveSettings(next);
  };
  const totalGoalStd = DRINKS.reduce((sum, d) => sum + standardDrinks(d, parseFloat(goalInputs[d.id]) || 0), 0);
  const savedGoalStd = DRINKS.reduce((sum, d) => sum + standardDrinks(d, (settings.goals || {})[d.id] || 0), 0);
  const RECOMMENDED_STD = 2; // 저위험 음주 기준 (1일 2표준잔 이하)
  const barMax = Math.max(8, savedGoalStd, totalStd, RECOMMENDED_STD);

  return (
    <div style={{ minHeight: "100vh", background: "#FFF6E5", color: "#3A2E22", padding: "24px 16px 80px", display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 13, letterSpacing: "0.2em", color: "#A8978A", marginBottom: 6, textTransform: "uppercase" }}>
            Save The Film
          </div>
          <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: "-0.02em" }}>
            🎬 지켜라 필름
          </div>
          <div style={{ fontSize: 13, color: "#7A6A5A", marginTop: 4, letterSpacing: "0.15em" }}>
            아님 내일 후회한다
          </div>
          {settings.email && (
            <div style={{ fontSize: 12, color: "#7AC74F", marginTop: 6 }}>{settings.email}</div>
          )}
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 20, background: "#FFFFFF", borderRadius: 999, padding: 4 }}>
          {[
            { id: "today", label: "기록하기" },
            { id: "stats", label: "통계" },
            { id: "settings", label: "설정" },
          ].map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "10px 0", borderRadius: 999, border: "none", background: tab === t.id ? "#F2E6D2" : "transparent", color: tab === t.id ? "#3A2E22" : "#A8978A", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              {t.label}
            </button>
          ))}
        </div>

        {tab === "today" && (
        <>
        <div style={{ ...card, marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ fontSize: 13, color: "#A8978A" }}>날짜 선택</div>
          <input
            type="date"
            value={selectedDate}
            max={todayKey()}
            onChange={(e) => setSelectedDate(e.target.value)}
            style={{ background: "#FFF6E5", color: "#3A2E22", border: "1px solid #E3D3BC", borderRadius: 8, padding: "6px 10px", fontSize: 14 }}
          />
        </div>

        <div style={{ ...card, position: "relative", overflow: "hidden", border: `1px solid ${level.color}33` }}>
          <div style={{ position: "absolute", top: -40, right: -40, width: 140, height: 140, borderRadius: "50%", background: level.color, opacity: 0.12, filter: "blur(20px)" }} />
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontSize: 48, fontWeight: 800, lineHeight: 1 }}>{totalStd.toFixed(1)}</span>
            <span style={{ fontSize: 16, color: "#A8978A" }}>표준잔</span>
          </div>
          {savedGoalStd > 0 && (
            <div style={{ marginTop: 8, fontSize: 13, color: "#A8978A" }}>
              일일 목표 {savedGoalStd.toFixed(1)} 표준잔
              {" "}
              <span style={{ color: totalStd > savedGoalStd ? "#E8743B" : "#7AC74F", fontWeight: 700 }}>
                ({totalStd > savedGoalStd ? "+" : ""}{(totalStd - savedGoalStd).toFixed(1)})
              </span>
            </div>
          )}
          <div style={{ marginTop: 14, display: "inline-flex", alignItems: "center", gap: 8, padding: "6px 14px", borderRadius: 999, background: `${level.color}22`, border: `1px solid ${level.color}55` }}>
            <span style={{ width: 8, height: 8, borderRadius: "50%", background: level.color, display: "inline-block" }} />
            <span style={{ fontSize: 14, fontWeight: 700, color: level.color }}>{level.label}</span>
          </div>
          <div style={{ marginTop: 10, fontSize: 13, color: "#7A6A5A" }}>
            {isToday ? level.desc : `${selectedDate} 기록`}
          </div>
          <div style={{ marginTop: 18, height: 6, borderRadius: 999, background: "#F2E6D2", position: "relative" }}>
            <div style={{ height: "100%", width: `${Math.min((totalStd / barMax) * 100, 100)}%`, background: level.color, borderRadius: 999, transition: "width 0.4s ease" }} />
            {savedGoalStd > 0 && (
              <div style={{ position: "absolute", top: -3, bottom: -3, left: `${Math.min((savedGoalStd / barMax) * 100, 100)}%`, width: 2, background: "#3A2E22" }} />
            )}
            <div style={{ position: "absolute", top: -3, bottom: -3, left: `${Math.min((RECOMMENDED_STD / barMax) * 100, 100)}%`, width: 2, background: "#A8978A" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#B6A795", marginTop: 6 }}>
            <span>0</span><span>{(barMax / 2).toFixed(1)}</span><span>{barMax.toFixed(1)} 표준잔</span>
          </div>
          <div style={{ display: "flex", gap: 16, fontSize: 11, color: "#A8978A", marginTop: 8 }}>
            {savedGoalStd > 0 && (
              <span><span style={{ color: "#3A2E22" }}>┃</span> 목표 {savedGoalStd.toFixed(1)}</span>
            )}
            <span><span style={{ color: "#A8978A" }}>┃</span> 권장 주량 {RECOMMENDED_STD.toFixed(1)}</span>
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 20 }}>
          {DRINKS.map((d) => {
            const count = counts[d.id] || 0;
            return (
              <div key={d.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#FFFFFF", borderRadius: 14, padding: "14px 16px", border: count > 0 ? `1px solid ${d.color}55` : "1px solid #F2E6D2" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: d.color }} />
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{d.label}</div>
                    <div style={{ fontSize: 12, color: "#A8978A" }}>1{d.unit} · 도수 {d.abv}%</div>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button onClick={() => remove(d)} disabled={count === 0} style={{ width: 36, height: 36, borderRadius: "50%", border: "1px solid #E3D3BC", background: "transparent", color: count === 0 ? "#DDD0BE" : "#3A2E22", fontSize: 18, cursor: count === 0 ? "default" : "pointer", lineHeight: 1 }}>−</button>
                  <span style={{ minWidth: 24, textAlign: "center", fontSize: 18, fontWeight: 800 }}>{count}</span>
                  <button onClick={() => add(d)} style={{ width: 36, height: 36, borderRadius: "50%", border: "none", background: d.color, color: "#FFF6E5", fontSize: 18, fontWeight: 800, cursor: "pointer", lineHeight: 1 }}>+</button>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ marginTop: 24, display: "flex", justifyContent: "center" }}>
          <button onClick={reset} style={{ background: "transparent", border: "1px solid #E3D3BC", color: "#A8978A", fontSize: 13, padding: "10px 20px", borderRadius: 999, cursor: "pointer" }}>
            이 날짜 기록 초기화
          </button>
        </div>
        </>
        )}

        {tab === "stats" && <StatsView history={history} settings={settings} />}

        {tab === "settings" && (
          <div>
            <div style={card}>
              <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 12 }}>로그인</div>
              {settings.email ? (
                <>
                  <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>{settings.email}</div>
                  <button onClick={logout} style={{ background: "transparent", border: "1px solid #E3D3BC", color: "#A8978A", fontSize: 13, padding: "8px 16px", borderRadius: 999, cursor: "pointer" }}>로그아웃</button>
                </>
              ) : (
                <>
                  <input
                    type="email"
                    placeholder="이메일 입력"
                    value={emailInput}
                    onChange={(e) => setEmailInput(e.target.value)}
                    style={{ width: "100%", background: "#FFF6E5", color: "#3A2E22", border: "1px solid #E3D3BC", borderRadius: 10, padding: "12px 14px", fontSize: 14, marginBottom: 10 }}
                  />
                  <button onClick={saveLogin} style={{ width: "100%", background: "#7AC74F", border: "none", color: "#FFF6E5", fontSize: 14, fontWeight: 700, padding: "12px 0", borderRadius: 10, cursor: "pointer" }}>로그인</button>
                  <div style={{ fontSize: 11, color: "#B6A795", marginTop: 10, lineHeight: 1.6 }}>
                    별도 서버 인증 없이 이 기기에만 저장돼요. 다른 기기와 동기화되지 않아요.
                  </div>
                </>
              )}
            </div>

            <div style={card}>
              <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 4 }}>일일 목표 (주종별)</div>
              <div style={{ fontSize: 11, color: "#B6A795", marginBottom: 14 }}>하루에 마실 잔 수를 종류별로 입력하면 표준잔 총합으로 환산돼요</div>
              {DRINKS.map((d) => (
                <div key={d.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: d.color, flexShrink: 0 }} />
                    <div>
                      <div style={{ fontSize: 14 }}>{d.label}</div>
                      <div style={{ fontSize: 11, color: "#A8978A" }}>{d.unit}/일</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                    <button
                      onClick={() => setGoalInputs({ ...goalInputs, [d.id]: String(Math.max(0, (parseFloat(goalInputs[d.id]) || 0) - 1)) })}
                      style={{ width: 32, height: 32, borderRadius: "50%", border: "1px solid #E3D3BC", background: "transparent", color: "#3A2E22", fontSize: 16, cursor: "pointer", lineHeight: 1, flexShrink: 0 }}
                    >−</button>
                    <span style={{ minWidth: 20, textAlign: "center", fontSize: 15, fontWeight: 800 }}>{goalInputs[d.id] || 0}</span>
                    <button
                      onClick={() => setGoalInputs({ ...goalInputs, [d.id]: String((parseFloat(goalInputs[d.id]) || 0) + 1) })}
                      style={{ width: 32, height: 32, borderRadius: "50%", border: "none", background: d.color, color: "#FFF6E5", fontSize: 16, fontWeight: 800, cursor: "pointer", lineHeight: 1, flexShrink: 0 }}
                    >+</button>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, marginBottom: 14, padding: "10px 14px", background: "#FFF6E5", borderRadius: 10 }}>
                <span style={{ fontSize: 13, color: "#7A6A5A" }}>일일 목표 총합</span>
                <span style={{ fontSize: 16, fontWeight: 800 }}>{totalGoalStd.toFixed(1)} 표준잔</span>
              </div>
              <button onClick={saveGoals} style={{ width: "100%", background: "#F2E6D2", border: "none", color: "#3A2E22", fontSize: 14, fontWeight: 700, padding: "12px 0", borderRadius: 10, cursor: "pointer" }}>저장</button>
              {savedGoalStd > 0 && (
                <div style={{ fontSize: 12, color: "#7A6A5A", marginTop: 10 }}>현재 저장된 목표: 일 {savedGoalStd.toFixed(1)} 표준잔</div>
              )}
            </div>

            <div style={card}>
              <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 4 }}>주종별 단가</div>
              <div style={{ fontSize: 11, color: "#B6A795", marginBottom: 14 }}>1{`{단위}`}당 가격을 입력하면 절약한 술값 계산에 쓰여요</div>
              {DRINKS.map((d) => (
                <div key={d.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: d.color, flexShrink: 0 }} />
                    <div>
                      <div style={{ fontSize: 14 }}>{d.label}</div>
                      <div style={{ fontSize: 11, color: "#A8978A" }}>원/{d.unit}</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                    <button
                      onClick={() => setPriceInputs({ ...priceInputs, [d.id]: String(Math.max(0, (parseInt(priceInputs[d.id], 10) || 0) - 1000)) })}
                      style={{ width: 32, height: 32, borderRadius: "50%", border: "1px solid #E3D3BC", background: "transparent", color: "#3A2E22", fontSize: 16, cursor: "pointer", lineHeight: 1, flexShrink: 0 }}
                    >−</button>
                    <span style={{ minWidth: 64, textAlign: "center", fontSize: 14, fontWeight: 800 }}>{Number(priceInputs[d.id] || 0).toLocaleString("ko-KR")}</span>
                    <button
                      onClick={() => setPriceInputs({ ...priceInputs, [d.id]: String((parseInt(priceInputs[d.id], 10) || 0) + 1000) })}
                      style={{ width: 32, height: 32, borderRadius: "50%", border: "none", background: d.color, color: "#FFF6E5", fontSize: 16, fontWeight: 800, cursor: "pointer", lineHeight: 1, flexShrink: 0 }}
                    >+</button>
                  </div>
                </div>
              ))}
              <button onClick={savePrices} style={{ width: "100%", background: "#F2E6D2", border: "none", color: "#3A2E22", fontSize: 14, fontWeight: 700, padding: "12px 0", borderRadius: 10, cursor: "pointer", marginTop: 4 }}>저장</button>
            </div>
          </div>
        )}

        <div style={{ marginTop: 20, fontSize: 11, color: "#C2B4A4", textAlign: "center", lineHeight: 1.6 }}>
          표준잔(약 8g 순알코올) 기준 추정치이며, 실제 잔 크기·도수에 따라 달라질 수 있어요.
          <br />기록은 이 기기에만 저장돼요.
        </div>
      </div>
    </div>
  );
}

function StatsView({ history, settings }) {
  const now = new Date();
  const year = now.getFullYear();

  const entries = Object.entries(history)
    .map(([date, counts]) => ({ date, total: totalFor(counts) }))
    .filter((e) => e.total > 0);

  const yearEntries = entries.filter((e) => e.date.startsWith(`${year}-`));
  const yearTotal = yearEntries.reduce((s, e) => s + e.total, 0);
  const yearDays = yearEntries.length;
  const avgPerDay = yearDays ? yearTotal / yearDays : 0;

  const goal = DRINKS.reduce((sum, d) => sum + standardDrinks(d, (settings.goals || {})[d.id] || 0), 0);

  const [monthOffset, setMonthOffset] = React.useState(0);
  const calMonth = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const calYear = calMonth.getFullYear();
  const calM = calMonth.getMonth();
  const firstDow = (new Date(calYear, calM, 1).getDay() + 6) % 7; // 0=Mon
  const daysInMonth = new Date(calYear, calM + 1, 0).getDate();
  const entryMap = {};
  entries.forEach((e) => { entryMap[e.date] = e.total; });
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const monthLabel = `${calYear}년 ${calM + 1}월`;

  // money: average cost on drinking days (all-time), used to value sober days
  const prices = settings.prices || {};
  const allCosts = entries.map((e) => totalCost(history[e.date] || {}, prices));
  const avgCostPerDrinkingDay = entries.length ? allCosts.reduce((a, b) => a + b, 0) / entries.length : 0;

  const monthKeyPrefix2 = `${calYear}-${pad(calM + 1)}-`;
  let monthSpent = 0, monthDrinkingDays = 0, monthPastDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = `${monthKeyPrefix2}${pad(d)}`;
    if (dk > todayKey()) continue;
    monthPastDays++;
    const c = history[dk];
    if (c && totalFor(c) > 0) {
      monthDrinkingDays++;
      monthSpent += totalCost(c, prices);
    }
  }
  const monthSoberDays = monthPastDays - monthDrinkingDays;
  const monthSaved = monthSoberDays * avgCostPerDrinkingDay;

  const monthly = Array.from({ length: 12 }, (_, i) => {
    const m = pad(i + 1);
    const total = yearEntries.filter((e) => e.date.slice(5, 7) === m).reduce((s, e) => s + e.total, 0);
    return { month: i + 1, total };
  });
  const maxMonthly = Math.max(1, ...monthly.map((m) => m.total));

  const recent = entries.slice().sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 7);

  return (
    <div>
      {avgCostPerDrinkingDay > 0 && (
        <div style={card}>
          <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 4 }}>{monthLabel} 아낀 술값</div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontSize: 36, fontWeight: 800, color: "#7AC74F" }}>{formatWon(monthSaved)}</span>
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: "#7A6A5A" }}>
            안 마신 날 {monthSoberDays}일 × 평소 한 번 마실 때 평균 {formatWon(avgCostPerDrinkingDay)}
          </div>
          <div style={{ marginTop: 4, fontSize: 12, color: "#A8978A" }}>
            이번 달 실제 지출 {formatWon(monthSpent)}
          </div>
        </div>
      )}
      <div style={card}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <button onClick={() => setMonthOffset((o) => o - 1)} style={{ background: "transparent", border: "1px solid #E3D3BC", color: "#A8978A", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 14 }}>‹</button>
          <div style={{ fontSize: 13, color: "#A8978A" }}>{monthLabel}</div>
          <button onClick={() => setMonthOffset((o) => Math.min(o + 1, 0))} disabled={monthOffset === 0} style={{ background: "transparent", border: "1px solid #E3D3BC", color: monthOffset === 0 ? "#DDD0BE" : "#A8978A", borderRadius: 8, width: 32, height: 32, cursor: monthOffset === 0 ? "default" : "pointer", fontSize: 14 }}>›</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 6 }}>
          {["월","화","수","목","금","토","일"].map((w) => (
            <div key={w} style={{ textAlign: "center", fontSize: 11, color: "#B6A795" }}>{w}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
          {cells.map((d, i) => {
            if (d === null) return <div key={i} />;
            const dateKey = `${calYear}-${pad(calM + 1)}-${pad(d)}`;
            const total = entryMap[dateKey] || 0;
            let bg = "#F2E6D2", color = "#B6A795";
            if (total > 0) {
              if (goal > 0) {
                bg = total > goal ? "#C0392B33" : "#7AC74F33";
                color = total > goal ? "#E8743B" : "#7AC74F";
              } else {
                bg = "#7AC74F33";
                color = "#7AC74F";
              }
            }
            const isToday = dateKey === todayKey();
            const isPast = dateKey < todayKey();
            const isSober = total === 0 && isPast;
            return (
              <div key={i} style={{ aspectRatio: "1", borderRadius: 8, background: bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", border: isToday ? "1px solid #3A2E22" : "1px solid transparent", position: "relative", overflow: "hidden" }}>
                <div style={{ fontSize: 11, color: total > 0 ? color : "#A8978A", fontWeight: total > 0 ? 700 : 400, zIndex: 1 }}>{d}</div>
                {total > 0 && <div style={{ fontSize: 9, color, marginTop: 2, zIndex: 1 }}>{total.toFixed(1)}</div>}
                {isSober && (
                  <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", transform: "rotate(-12deg)" }}>
                    <span style={{ fontSize: 8, fontWeight: 800, color: "#7AC74F", border: "1px solid #7AC74F", borderRadius: 4, padding: "1px 3px", lineHeight: 1, whiteSpace: "nowrap", background: "#FFF6E5" }}>
                      참 잘했어요
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {goal > 0 ? (
          <div style={{ marginTop: 12, fontSize: 11, color: "#B6A795" }}>
            <span style={{ color: "#7AC74F" }}>●</span> 목표 이하&nbsp;&nbsp;
            <span style={{ color: "#E8743B" }}>●</span> 목표 초과&nbsp;&nbsp;
            <span style={{ color: "#7AC74F" }}>참 잘했어요</span> 술 안 마신 날
            <br />일일 목표 {goal.toFixed(1)} 표준잔
          </div>
        ) : (
          <div style={{ marginTop: 12, fontSize: 11, color: "#B6A795" }}>
            설정에서 일일 목표를 입력하면 초과 여부가 색으로 표시돼요 ·{" "}
            <span style={{ color: "#7AC74F" }}>참 잘했어요</span> 도장은 술 안 마신 날에 찍혀요
          </div>
        )}
      </div>

      <div style={card}>
        <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 14 }}>{monthLabel} 주종별 음주량</div>
        {(() => {
          const monthKeyPrefix = `${calYear}-${pad(calM + 1)}-`;
          const drinkTotals = DRINKS.map((d) => {
            let count = 0, std = 0;
            Object.entries(history).forEach(([date, counts]) => {
              if (!date.startsWith(monthKeyPrefix)) return;
              const c = counts[d.id] || 0;
              count += c;
              std += standardDrinks(d, c);
            });
            return { ...d, count, std };
          });
          const maxStd = Math.max(1, ...drinkTotals.map((d) => d.std));
          const anyData = drinkTotals.some((d) => d.count > 0);
          if (!anyData) return <div style={{ fontSize: 13, color: "#B6A795" }}>이 달 기록이 없어요</div>;
          return drinkTotals.map((d) => (
            <div key={d.id} style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                <span>{d.label}</span>
                <span style={{ color: "#7A6A5A" }}>{d.count}{d.unit.replace(/\(.+\)/, "")} · {d.std.toFixed(1)} 표준잔</span>
              </div>
              <div style={{ height: 6, borderRadius: 999, background: "#F2E6D2", overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(d.std / maxStd) * 100}%`, background: d.color, borderRadius: 999 }} />
              </div>
            </div>
          ));
        })()}
      </div>

      <div style={card}>
        <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 4 }}>{year}년 누적</div>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontSize: 40, fontWeight: 800 }}>{yearTotal.toFixed(1)}</span>
          <span style={{ fontSize: 14, color: "#A8978A" }}>표준잔</span>
        </div>
        <div style={{ marginTop: 14, display: "flex", gap: 20, fontSize: 13, color: "#7A6A5A" }}>
          <div><div style={{ fontWeight: 800, fontSize: 18, color: "#3A2E22" }}>{yearDays}</div>음주 일수</div>
          <div><div style={{ fontWeight: 800, fontSize: 18, color: "#3A2E22" }}>{avgPerDay.toFixed(1)}</div>마신 날 평균</div>
        </div>
      </div>

      <div style={card}>
        <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 14 }}>월별 음주량</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 100 }}>
          {monthly.map((m) => (
            <div key={m.month} style={{ flex: 1, textAlign: "center" }}>
              <div style={{ height: 80, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                <div style={{ width: "70%", height: `${(m.total / maxMonthly) * 100}%`, minHeight: m.total > 0 ? 3 : 0, background: m.total > 0 ? "#7AC74F" : "#F2E6D2", borderRadius: 3 }} />
              </div>
              <div style={{ fontSize: 10, color: "#B6A795", marginTop: 6 }}>{m.month}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ ...card, marginBottom: 0 }}>
        <div style={{ fontSize: 13, color: "#A8978A", marginBottom: 14 }}>최근 기록</div>
        {recent.length === 0 && <div style={{ fontSize: 13, color: "#B6A795" }}>아직 기록이 없어요</div>}
        {recent.map((e) => (
          <div key={e.date} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #F2E6D2", fontSize: 13 }}>
            <span style={{ color: "#7A6A5A" }}>{e.date}</span>
            <span style={{ fontWeight: 700 }}>{e.total.toFixed(1)} 표준잔</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<DrinkTracker />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
